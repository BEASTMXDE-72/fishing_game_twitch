<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Fishing Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: Arial; background:#0f172a; color:#fff; margin:0; padding:20px;}
.container { max-width:900px; margin:auto;}
.card { background:#1e293b; padding:20px; border-radius:12px; margin-bottom:20px;}
h1,h2 { margin-top:0;}
.small { color:#94a3b8;}
.highlight { color:#38bdf8;}
</style>
</head>
<body>
<div class="container">

<h1>🎣 Рыбалка на стриме</h1>
<p class="small">Лови рыбу, зарабатывай и попадай в топ</p>

<div class="card">
<h2>🏆 Топ игроков</h2>
<div id="top">Загрузка...</div>
</div>

<div class="card">
<h2>🐟 Лучший улов стрима</h2>
<div id="legendary">Пока нет данных</div>
</div>

<div class="card">
<h2>ℹ️ Что важно знать</h2>
<p>Прогресс сохраняется между стримами.</p>
<p>Сайт обновляется после окончания стрима.</p>
</div>

</div>

<script>
fetch('top.json')
.then(r=>r.json())
.then(data=>{
  const el=document.getElementById('top');
  el.innerHTML='';
  data.top.forEach((p,i)=>{
    el.innerHTML += `<div>#${i+1} ${p.username} — ${p.balance} ₽</div>`;
  });
})
.catch(()=>{document.getElementById('top').innerText='Топ обновится после стрима';});

fetch('legendary.json')
.then(r=>r.json())
.then(d=>{
  const el=document.getElementById('legendary');
  el.innerHTML = `
    <div><b>@${d.username}</b></div>
    <div class="highlight">${d.fish_name}</div>
    <div>${d.weight} кг</div>
    <div>${d.gold} ₽</div>
  `;
})
.catch(()=>{document.getElementById('legendary').innerText='Появится после легендарного улова';});
</script>

</body>
</html>
